    <text x="286" y="594" font-size="15" font-weight="800" fill="#ffffff">JOIN SERVER</text>

    <rect x="810" y="338" rx="10" ry="10" width="76" height="30" fill="#ff8c42"/>
    <text x="831" y="359" font-size="13" font-weight="800" fill="#ffffff">#2</text>
    <text x="582" y="362" font-size="15" font-weight="700" fill="#5b5b5b">🇯🇵 Japan</text>
    <text x="580" y="430" font-size="66" font-weight="800" fill="#ff8c42">92</text>
    <text x="688" y="425" font-size="18" font-weight="700" fill="#ff8c42">ms</text>
    <text x="788" y="425" font-size="13" font-weight="700" fill="#ff8c42">Good</text>
    <text x="580" y="486" font-size="15" font-weight="700" fill="#555555">👥 24/30</text>
    <rect x="580" y="500" width="300" height="10" rx="5" fill="#e7e7e7"/>
    <rect x="580" y="500" width="240" height="10" rx="5" fill="#ff8c42"/>
    <text x="580" y="548" font-size="13" fill="#848484">FPS: 58</text>
    <text x="745" y="548" font-size="13" fill="#848484">Free: 6</text>
    <rect x="580" y="566" rx="12" ry="12" width="300" height="44" fill="#ff8c42"/>
    <text x="666" y="594" font-size="15" font-weight="800" fill="#ffffff">JOIN SERVER</text>

    <rect x="1190" y="338" rx="10" ry="10" width="76" height="30" fill="#ff8c42"/>
    <text x="1211" y="359" font-size="13" font-weight="800" fill="#ffffff">#3</text>
    <text x="962" y="362" font-size="15" font-weight="700" fill="#5b5b5b">🌍 US East</text>
    <text x="960" y="430" font-size="66" font-weight="800" fill="#f2994a">128</text>
    <text x="1089" y="425" font-size="18" font-weight="700" fill="#f2994a">ms</text>
    <text x="1180" y="425" font-size="13" font-weight="700" fill="#f2994a">Fair</text>
    <text x="960" y="486" font-size="15" font-weight="700" fill="#555555">👥 10/30</text>
    <rect x="960" y="500" width="300" height="10" rx="5" fill="#e7e7e7"/>
    <rect x="960" y="500" width="100" height="10" rx="5" fill="#f2994a"/>
    <text x="960" y="548" font-size="13" fill="#848484">FPS: 52</text>
    <text x="1125" y="548" font-size="13" fill="#848484">Free: 20</text>
    <rect x="960" y="566" rx="12" ry="12" width="300" height="44" fill="#f2994a"/>
    <text x="1046" y="594" font-size="15" font-weight="800" fill="#ffffff">JOIN SERVER</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#8b8b8b" font-weight="600">
    <text x="170" y="700">Legend: Excellent ≤80ms  ·  Good ≤130ms  ·  Fair ≤180ms  ·  Slow ≤240ms  ·  Poor 240ms+</text>
  </g>
</svg>