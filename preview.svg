    <text x="202" y="362" font-size="15" font-weight="700" fill="#5b5b5b">🇸🇬 Singapore</text>
    <text x="200" y="430" font-size="66" font-weight="800" fill="#33a852">48</text>
    <text x="308" y="425" font-size="18" font-weight="700" fill="#33a852">ms</text>
    <text x="408" y="425" font-size="13" font-weight="700" fill="#33a852">Excellent</text>
    <text x="200" y="486" font-size="15" font-weight="700" fill="#555555">👥 18/30</text>
