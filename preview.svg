    <rect x="200" y="500" width="180" height="10" rx="5" fill="#33a852"/>
    <text x="200" y="548" font-size="13" fill="#848484">FPS: 60</text>
    <text x="365" y="548" font-size="13" fill="#848484">Free: 12</text>
